<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rmyatolauncher — Лучший лаунчер Minecraft</title>
    <link rel="icon" href="https://uploads.onecompiler.io/43bwbqbxa/44v59a2k5/rmyatolauncher.ico" type="image/x-icon">
    <style>
        :root {
            --bg-color: #0f0c1b;
            --accent-color: #8a2be2;
            --accent-hover: #a04ef6;
            --text-color: #ffffff;
            --text-muted: #a0a5c0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: space-between;
            overflow-x: hidden;
        }

        /* Задний фон с легким свечением */
        .glow-bg {
            position: absolute;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
        }

        header {
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .logo img {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 8px var(--accent-color));
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            max-width: 800px;
            margin: auto;
            z-index: 1;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #fff, #b983ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            max-width: 600px;
            line-height: 1.6;
        }

        /* Кнопка скачивания */
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background-color: var(--accent-color);
            color: #fff;
            padding: 18px 45px;
            font-size: 1.25rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.4);
        }

        .download-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.7);
        }

        footer {
            padding: 30px 20px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            header { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="glow-bg"></div>

    <header>
        <div class="logo">
            <img src="https://uploads.onecompiler.io/43bwbqbxa/44v59a2k5/rmyatolauncher.ico" alt="rmyatolauncher logo">
            rmyatolauncher
        </div>
    </header>

    <main class="main-content">
        <h1>Твой новый мир Minecraft</h1>
        <p class="subtitle">Открой для себя rmyatolauncher — быстрый, легкий и максимально удобный лаунчер для комфортного запуска любимой игры без лишнего мусора.</p>
        
        <a href="download.html" class="download-btn">
            Скачать лаунчер
        </a>
    </main>

    <footer>
        &copy; 2026 rmyatolauncher. Все права защищены. Minecraft является торговой маркой Mojang Synergies AB.
    </footer>
</body>
</html>
